<section class="center-page">
  <div class="card">
    <div class="card-header">
      <div class="icon-container">
        <div class="icon-wrapper">          
          <img src="/logo.png" alt="Logo" class="icon"/>
        </div>
      </div>
      <h4 class="card-title">Sistema de Gestión Multimedia</h4>
      <p class="card-description">Ingresa tus credenciales para acceder al sistema</p>
    </div>
    <div class="card-content">
      <form class="form" (submit)="onSubmit($event)">
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <input
            type="text"
            class="form-input"
            id="username"
            name="username"
            placeholder="Ingresa tu usuario"
            ngModel
            required
            value=""
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-input"
              id="password"
              name="password"
              placeholder="Ingresa tu contraseña"
              ngModel
              required
              value=""
            />
          </div>
        </div>
        <button class="btn btn-primary" type="submit">Iniciar Sesión</button>

        <a class="btn btn-register" routerLink="/register"> Crear Cuenta </a>

        <!-- <p id="errorDisplay" class="errorDisplay error">Usuario o contraseña incorrectos</p> -->
        <div hidden id="errorDisplay" class="errorDisplay">
          <span class="error-icon">⚠</span>
          <div class="error-content">
            <strong>Error de autenticación</strong>
            <p>Usuario o contraseña incorrectos</p>
          </div>
        </div>
      </form>      
    </div>
  </div>
</section>
