<section class="center-page">
  <div class="card">
    <div class="card-header">
      <div class="icon-container">
        <div class="icon-wrapper">
          <img src="/logo.png" alt="Logo" class="icon" />
        </div>
      </div>
      <h4 class="card-title">Registro de Usuario</h4>
      <p class="card-description">Crea una cuenta para acceder al sistema</p>
    </div>

    <div class="card-content">
      <form class="form" (submit)="onRegister($event)">
        
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="text"
              id="username"
              name="username"
              placeholder="Nombre de usuario"
              required
              (focus)="showTooltipUsername = true"
              (blur)="showTooltipUsername = false"
              (mouseenter)="showTooltipUsername = true"
              (mouseleave)="showTooltipUsername = false"
            />
            <div class="input-tooltip" *ngIf="showTooltipUsername">
              Solo letras, números y guiones.
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              placeholder="Contraseña"
              required
              (input)="onPasswordInput($event)"
              (focus)="showTooltipPassword = true"
              (blur)="showTooltipPassword = false"
              (mouseenter)="showTooltipPassword = true"
              (mouseleave)="showTooltipPassword = false"
            />
            <div class="input-tooltip" *ngIf="showTooltipPassword">
              Mín. 8 caracteres, Mayús. y Número.
            </div>
          </div>

          <div class="password-strength-container" *ngIf="password.length > 0">
            <div class="password-text" [style.color]="passwordColor">{{ passwordText }}</div>
            <div class="password-strength">
              <div class="strength-bar" [style.width.%]="passwordStrength" [style.background-color]="passwordColor"></div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Repite la contraseña"
              required
              (input)="onConfirmInput($event)"
              (focus)="showTooltipConfirm = true"
              (blur)="showTooltipConfirm = false"
              (mouseenter)="showTooltipConfirm = true"
              (mouseleave)="showTooltipConfirm = false"
            />
            <div class="input-tooltip" *ngIf="showTooltipConfirm">
              Debe coincidir con la contraseña anterior.
            </div>
          </div>
        </div>

        <button class="btn btn-primary" type="submit">Crear Cuenta</button>
        
        <a class="btn btn-register" routerLink="/login">Volver al login</a>

        <div id="errorDisplay" class="errorDisplay" style="display: none;">
          <span class="error-icon">⚠</span>
          <div class="error-content">
            <strong>Error de registro</strong>
            <p id="errorText"></p>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>
