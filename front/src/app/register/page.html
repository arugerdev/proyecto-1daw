<div class="min-h-screen flex items-center justify-center bg-surface-900 p-4">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 -left-32 w-96 h-96 bg-primary-600/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-primary-700/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-600 mb-4 shadow-lg shadow-primary-600/30">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-surface-100">EcijaComarca</h1>
      <p class="text-surface-400 text-sm mt-1">Crea tu cuenta</p>
    </div>

    <div class="bg-surface-800 border border-surface-700 rounded-2xl p-8 shadow-2xl">
      <h2 class="text-xl font-semibold text-surface-100 mb-6">Registro</h2>

      <div *ngIf="error" class="flex items-center gap-2 p-3 mb-4 rounded-lg bg-red-600/10 border border-red-600/30 text-red-400 text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ error }}
      </div>

      <form (ngSubmit)="onRegister()" class="space-y-4">
        <div>
          <label class="input-label">Nombre de usuario</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-surface-500">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </span>
            <input [(ngModel)]="username" name="username" type="text" autocomplete="username"
              placeholder="letras, números, guiones" class="input pl-9" [disabled]="loading"/>
          </div>
        </div>

        <div>
          <label class="input-label">Contraseña</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-surface-500">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </span>
            <input [(ngModel)]="password" name="password" [type]="showPassword ? 'text' : 'password'"
              placeholder="Mínimo 6 caracteres" class="input pl-9 pr-10" [disabled]="loading"/>
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-surface-500 hover:text-surface-300 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  [attr.d]="showPassword ? 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21' : 'M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z'"/>
              </svg>
            </button>
          </div>
          <!-- Strength meter -->
          <div *ngIf="password.length > 0" class="mt-2">
            <div class="flex gap-1 mb-1">
              <div *ngFor="let i of [0,1,2,3]" class="h-1 flex-1 rounded-full transition-all"
                [class]="i < strength ? strengthColor : 'bg-surface-700'"></div>
            </div>
            <p class="text-xs text-surface-500">{{ strengthLabel }}</p>
          </div>
        </div>

        <div>
          <label class="input-label">Confirmar contraseña</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-surface-500">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
            </span>
            <input [(ngModel)]="confirmPassword" name="confirmPassword" type="password"
              placeholder="Repite la contraseña" class="input pl-9" [disabled]="loading"
              [class.border-emerald-500]="confirmPassword && confirmPassword === password"
              [class.border-red-500]="confirmPassword && confirmPassword !== password"/>
          </div>
        </div>

        <button type="submit" class="btn-primary w-full py-2.5 mt-2" [disabled]="loading">
          <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          {{ loading ? 'Creando cuenta...' : 'Crear cuenta' }}
        </button>
      </form>

      <p class="text-center text-sm text-surface-500 mt-6">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-primary-400 hover:text-primary-300 font-medium transition-colors">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
