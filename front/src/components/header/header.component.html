<header class="header">
    <div class="header-left">
        <button *ngIf="subRoute" class="header-back-button" (click)="back()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-arrow-left h-5 w-5">
                <path d="m12 19-7-7 7-7"></path>
                <path d="M19 12H5"></path>
            </svg>
        </button>
        <!--
        <div class="icon-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
                <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                <path d="m10 11 5 3-5 3v-6Z"></path>
            </svg>
            
        </div>
        -->
        <img src="logo.png" alt="" srcset="" width="64" style="object-fit: contain; aspect-ratio: 1/1;">
        <div>
            <h1>Ecija Comarca</h1>
            <p>Administración y consulta de contenido</p>
        </div>
    </div>

    <div class="header-right">
        <a *ngIf="canAccessAdminPanel" [class]="canAccessAdminPanel ? 'a-admin' : 'a-admin disabled'" [href]="canAccessAdminPanel ? '/dashboard' : ''">

            <!-- SVG Shield -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z">
                </path>
            </svg>
            Administrador
        </a>

        <button class="btn-logout" (click)="logout()">
            <!-- SVG LogOut -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Salir
        </button>
    </div>
</header>
